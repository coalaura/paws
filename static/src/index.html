<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />

		<title>paws</title>
	</head>
	<body>
		<div id="global-loader">
			<div class="spinner"></div>
		</div>

		<div id="left-panel">
			<div class="header">
				<img src="logo.png" alt="logo" class="logo" />

				<h1>paws</h1>

				<div id="usage-display" class="usage-display" title="Paws: Usage today"></div>
			</div>

			<div class="panel-content">
				<div class="preset-row">
					<select id="preset-select" title="Saved Setups / Presets">
						<option value="" disabled selected>Load Setup...</option>
					</select>

					<button id="save-preset-btn" class="preset-icon-btn" title="Save current setup">
						<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
					</button>

					<button id="delete-preset-btn" class="preset-icon-btn danger" title="Delete selected setup" disabled>
						<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 3 21 3 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
					</button>
				</div>

				<div class="form-group">
					<label for="model">Model</label>

					<select id="model" data-searchable></select>
				</div>

				<div class="form-group">
					<div class="form-row">
						<div class="form-group">
							<label for="resolution">Resolution</label>

							<select id="resolution">
								<option value="1K">1K</option>
								<option value="2K" selected>2K</option>
								<option value="4K">4K</option>
							</select>
						</div>

						<div class="form-group">
							<label for="aspect-ratio">Aspect Ratio</label>

							<select id="aspect-ratio">
								<option value="" selected>auto</option>
								<option value="1:1">1:1</option>
								<option value="1:2">1:2</option>
								<option value="1:4">1:4</option>
								<option value="1:8">1:8</option>
								<option value="2:1">2:1</option>
								<option value="2:3">2:3</option>
								<option value="3:2">3:2</option>
								<option value="3:4">3:4</option>
								<option value="4:1">4:1</option>
								<option value="4:3">4:3</option>
								<option value="4:5">4:5</option>
								<option value="5:4">5:4</option>
								<option value="8:1">8:1</option>
								<option value="9:16">9:16</option>
								<option value="16:9">16:9</option>
								<option value="9:19.5">9:19.5</option>
								<option value="19.5:9">19.5:9</option>
								<option value="9:20">9:20</option>
								<option value="20:9">20:9</option>
								<option value="9:21">9:21</option>
								<option value="21:9">21:9</option>
							</select>
						</div>
					</div>

					<div class="resolution-estimate" id="resolution-estimate">
						Estimated Target: <span id="resolution-estimate-val">2048 x 2048 px</span>
					</div>
				</div>

				<div class="form-group">
					<div class="composer-container">
						<div class="composer-header-row">
							<div class="composer-tabs">
								<button type="button" id="composer-tab-prompt" class="composer-tab active" data-pane="prompt">Prompt</button>
								<button type="button" id="composer-tab-system" class="composer-tab" data-pane="system">System</button>
							</div>

							<label class="toggle-label hidden" id="system-default-toggle" title="Use optimal default instructions">
								<input type="checkbox" id="use-default-system" />
								Default
							</label>
						</div>

						<textarea id="prompt" placeholder="A cat in a banana suit..."></textarea>
						<textarea id="system-message" class="hidden" placeholder="Optional system instructions..."></textarea>
					</div>
				</div>

				<div class="form-group">
					<div class="label-row" id="ref-images-header">
						<label>Reference Images <span id="ref-count">(0/4)</span></label>

						<div class="max-ref-wrapper">
							<select id="max-ref-resolution">
								<option value="0">Original</option>
								<option value="1024">Max 1K</option>
								<option value="2048">Max 2K</option>
								<option value="4096">Max 4K</option>
							</select>
						</div>
					</div>

					<div id="reference-images" data-total="1">
						<button id="add-ref-btn" title="Add reference image"></button>

						<input type="file" id="file-input" accept="image/*" multiple class="hidden" />
					</div>
				</div>
			</div>

			<button id="generate-btn">Generate Image</button>
		</div>

		<div id="right-panel">
			<div id="grid"></div>
		</div>

		<div id="image-modal" class="modal">
			<div class="background"></div>

			<div class="content image-modal-content">
				<button id="close-image-modal" class="close-btn">&times;</button>

				<img id="full-image" src="" alt="Full Resolution" />
			</div>
		</div>

		<div id="save-preset-modal" class="modal">
			<div class="background"></div>

			<div class="content">
				<div class="header">Save Setup</div>

				<div class="body">
					<div id="save-preset-error" class="error"></div>

					<div class="form-group">
						<label for="preset-name-input">Setup Name</label>
						<input type="text" id="preset-name-input" placeholder="e.g. Anime Style" autocomplete="off" />
					</div>
				</div>

				<div class="buttons" style="gap: 12px; margin-top: 16px;">
					<button id="cancel-save-preset-btn" class="modal-btn secondary">Cancel</button>
					<button id="confirm-save-preset-btn" class="modal-btn primary">Save</button>
				</div>
			</div>
		</div>

		<div id="authentication" class="modal">
			<div class="background"></div>

			<div class="content">
				<div class="header">Authentication</div>

				<div class="body">
					<div id="auth-error" class="error"></div>

					<div class="form-group">
						<label for="username">Username</label>
						<input type="text" name="username" id="username" placeholder="admin" />
					</div>

					<div class="form-group">
						<label for="password">Password</label>
						<input type="password" name="password" id="password" />
					</div>
				</div>

				<div class="buttons">
					<button id="login">Login</button>
				</div>
			</div>
		</div>
	</body>
</html>
